<!DOCTYPE html>
<html>
<head>
<title>Typing Pulse Visualizer</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
position:absolute;
top:20px;
width:100%;
text-align:center;
}

header h1{
font-size:36px;
letter-spacing:2px;
}

header p{
opacity:0.8;
margin-top:5px;
}

#stats{
position:absolute;
left:30px;
top:120px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
padding:25px;
border-radius:12px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.4);
font-size:18px;
line-height:2;
}

#stats span{
color:#00f7ff;
font-weight:bold;
}

canvas{
display:block;
}

#startBtn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);

padding:10px 20px;
font-size:15px;
color:white;
cursor:pointer;

/* 👇 make it visible */
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.4);
border-radius:8px;

/* slight glow */
box-shadow:0 0 10px rgba(0,0,0,0.4);

transition:all 0.2s ease;
}

/* hover */
#startBtn:hover{
background:rgba(255,255,255,0.25);
border-color:#00f7ff;
}

/* click */
#startBtn:active{
transform:translateX(-50%) scale(0.95);
}
</style>
</head>

<body>

<header>
<h1>⌨️ Typing Pulse Visualizer</h1>
<p>Click Start → then type for music 🎧🔥</p>
</header>

<!-- 🔥 Start Button -->
<button id="startBtn">Start Music</button>

<div id="stats">
Keys Pressed: <span id="keyCount">0</span><br>
Typing Speed: <span id="speed">0</span> WPM<br>
Typing Style: <span id="style">Waiting...</span>
</div>

<canvas id="canvas"></canvas>

<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let angle=0;
let energy=0;

let keys=0;
let startTime=null;

let keyText=document.getElementById("keyCount");
let speedText=document.getElementById("speed");
let styleText=document.getElementById("style");

// ================= AUDIO =================
let audioCtx = null;

// 🔥 start audio on button click
document.getElementById("startBtn").addEventListener("click", () => {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
});

// scale
const scale = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25];

function playTypingSound(key){
    if(!audioCtx) return;

    let now = audioCtx.currentTime;

    let index = key.charCodeAt(0) % scale.length;
    let freq = scale[index] + Math.min(keys*3,300);

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = ["sine","triangle","square"][Math.floor(Math.random()*3)];
    osc.frequency.setValueAtTime(freq,now);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.6,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.25);

    osc.start(now);
    osc.stop(now+0.25);

    // bass
    if(keys%5===0){
        let bass=audioCtx.createOscillator();
        let bg=audioCtx.createGain();

        bass.frequency.value=100+Math.random()*50;
        bass.type="sawtooth";

        bass.connect(bg);
        bg.connect(audioCtx.destination);

        bg.gain.setValueAtTime(0.7,now);
        bg.gain.exponentialRampToValueAtTime(0.001,now+0.3);

        bass.start(now);
        bass.stop(now+0.3);
    }
}

// ================= KEY =================
document.addEventListener("keydown",function(e){

playTypingSound(e.key.toLowerCase());

if(!startTime){
startTime=Date.now();
}

keys++;
energy+=0.35;

keyText.innerText=keys;

let minutes=(Date.now()-startTime)/60000;

if(minutes>0){
let wpm=Math.floor((keys/5)/minutes);
speedText.innerText=wpm;

if(wpm<20){
styleText.innerText="Calm Thinker";
}
else if(wpm<40){
styleText.innerText="Balanced Typer";
}
else{
styleText.innerText="Speed Typer";
}
}

});

// ================= ANIMATION =================
function animate(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let cx=canvas.width/2;
let cy=canvas.height/2;

for(let i=0;i<100;i++){

let t=i*0.25+angle;

let x1=cx+Math.sin(t)*180;
let y1=cy+i*5-250;

let x2=cx+Math.sin(t+Math.PI)*180;

let hue=(angle*50+i*3)%360;

ctx.strokeStyle="hsl("+hue+",100%,60%)";
ctx.shadowBlur=12;
ctx.shadowColor="hsl("+hue+",100%,60%)";

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y1);
ctx.stroke();
}

angle+=0.02+energy;
energy*=0.93;

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
