<!DOCTYPE html>
<html>
<head>
<title>Typing Pulse Visualizer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* header */

header{
position:absolute;
top:20px;
width:100%;
text-align:center;
}

header h1{
font-size:36px;
letter-spacing:2px;
}

header p{
opacity:0.8;
margin-top:5px;
}

/* stats card */

#stats{
position:absolute;
left:30px;
top:120px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
padding:25px;
border-radius:12px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.4);
font-size:18px;
line-height:2;
}

#stats span{
color:#00f7ff;
font-weight:bold;
}

/* canvas */

canvas{
display:block;
}

</style>
</head>

<body>

<header>
<h1>⌨️ Typing Pulse Visualizer</h1>
<p>Watch your typing rhythm turn into animated patterns</p>
</header>

<div id="stats">
Keys Pressed: <span id="keyCount">0</span><br>
Typing Speed: <span id="speed">0</span> WPM<br>
Typing Style: <span id="style">Waiting...</span>
</div>

<canvas id="canvas"></canvas>

<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let angle=0;
let energy=0;

let keys=0;
let startTime=null;

let keyText=document.getElementById("keyCount");
let speedText=document.getElementById("speed");
let styleText=document.getElementById("style");

/* key press */

document.addEventListener("keydown",function(){

if(!startTime){
startTime=Date.now();
}

keys++;
energy+=0.35;

keyText.innerText=keys;

/* calculate WPM */

let minutes=(Date.now()-startTime)/60000;

if(minutes>0){

let wpm=Math.floor((keys/5)/minutes);
speedText.innerText=wpm;

if(wpm<20){
styleText.innerText="Calm Thinker";
}
else if(wpm<40){
styleText.innerText="Balanced Typer";
}
else{
styleText.innerText="Speed Typer";
}

}

});

/* animation */

function animate(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let cx=canvas.width/2;
let cy=canvas.height/2;

for(let i=0;i<100;i++){

let t=i*0.25+angle;

let x1=cx+Math.sin(t)*180;
let y1=cy+i*5-250;

let x2=cx+Math.sin(t+Math.PI)*180;
let y2=y1;

let hue=(angle*50+i*3)%360;

ctx.strokeStyle="hsl("+hue+",100%,60%)";

ctx.shadowBlur=12;
ctx.shadowColor="hsl("+hue+",100%,60%)";

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();

}

angle+=0.02+energy;
energy*=0.93;

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
